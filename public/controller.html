<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TT Referee Panel</title>

  <script src="/socket.io/socket.io.js"></script>

  <style>

    body{
      margin:0;
      background:#11151c;
      font-family:-apple-system,system-ui;
      color:white;
    }

    .wrapper{
      max-width:650px;
      margin:auto;
      padding:18px;
    }

    .scoreGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-bottom:20px;
    }

    .card{
      background:#1e2530;
      padding:20px;
      border-radius:18px;
      text-align:center;
    }

    .name{
      font-weight:900;
      margin-bottom:8px;
    }

    .points{
      font-size:44px;
      font-weight:900;
    }

    .serve{
      margin-top:8px;
      font-size:20px;
      color:#ffd54f;
    }

    button{
      border:none;
      border-radius:16px;
      font-size:20px;
      padding:16px;
      margin:6px 0;
      width:100%;
      font-weight:900;
      cursor:pointer;
    }

    button:active{
      transform:scale(.95);
    }

    .startBtn{
      background:#a5ae58;
    }

    .btnA{
      background:#f80000;
    }

    .btnB{
      background:#0070ff;
    }

    .timeout{
      background:#ff9800;
    }

    .small{
      font-size:15px;
      padding:12px;
    }

    .danger{
      background:#b00020;
    }

  </style>
</head>

<body>

<div class="wrapper">

  <div class="scoreGrid">

    <div class="card">

      <div class="name" id="nameA">JOUEUR A</div>

      <div class="points" id="scoreA">0</div>

      <div class="serve" id="serveA"></div>

    </div>

    <div class="card">

      <div class="name" id="nameB">JOUEUR B</div>

      <div class="points" id="scoreB">0</div>

      <div class="serve" id="serveB"></div>

    </div>

  </div>

  <button class="startBtn" id="startBtn">
    Démarrer match
  </button>

  <button class="btnA" id="btnA" disabled></button>
  <button class="btnB" id="btnB" disabled></button>

  <button class="timeout" id="toA">
    Temps mort A
  </button>

  <button class="timeout" id="toB">
    Temps mort B
  </button>

  <button class="small" onclick="safeSend('UNDO')">
    Annuler
  </button>

  <button class="small danger" onclick="safeSend('RESET_MATCH')">
    Reset Match
  </button>

</div>

<script>

  const room =
          new URLSearchParams(location.search).get("room") || "table1"

  const socket = io()

  const el = id => document.getElementById(id)

  let lastState = null

  /* ====================
  SEND ACTION
  ==================== */

  function safeSend(type,data={}){

    socket.emit("action",{
      room,
      type,
      ...data
    })

  }

  /* ====================
  START MATCH
  ==================== */

  el("startBtn").onclick = ()=>{

    if(!lastState) return

    const nameA = lastState.players.A
    const nameB = lastState.players.B

    const serveChoice = prompt(
            "Qui sert en premier ?\n\n1 = "+nameA+"\n2 = "+nameB
    )

    if(serveChoice==="1")
      safeSend("SET_SERVE",{serve:"A"})

    if(serveChoice==="2")
      safeSend("SET_SERVE",{serve:"B"})


    const sideChoice = prompt(
            "Quel côté est le joueur A ?\n\n1 = côté 1\n2 = côté 2"
    )

    if(sideChoice==="2")
      safeSend("SWAP_SIDES")

  }

  /* ====================
  SOCKET
  ==================== */

  socket.on("connect",()=>{

    socket.emit("join",room)

  })

  socket.on("state",(st)=>{

    lastState = st

    el("nameA").textContent = st.players.A
    el("nameB").textContent = st.players.B

    el("scoreA").textContent = st.points.A
    el("scoreB").textContent = st.points.B

    el("btnA").textContent = "+1 "+st.players.A
    el("btnB").textContent = "+1 "+st.players.B

    el("btnA").disabled = st.timeoutActive
    el("btnB").disabled = st.timeoutActive

    el("btnA").onclick = ()=>safeSend("POINT_A")
    el("btnB").onclick = ()=>safeSend("POINT_B")

    el("toA").onclick = ()=>safeSend("TIMEOUT_START",{by:"A"})
    el("toB").onclick = ()=>safeSend("TIMEOUT_START",{by:"B"})

    /* SERVICE ARROW */

    if(st.serve==="A"){

      el("serveA").textContent = "◀ SERVICE"
      el("serveB").textContent = ""

    }else{

      el("serveB").textContent = "SERVICE ▶"
      el("serveA").textContent = ""

    }

  })

</script>

</body>
</html>
