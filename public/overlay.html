<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TT Overlay Pro</title>

  <style>

    :root{
      --bg: rgba(12,14,18,.88);
      --stroke: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.95);
      --accentA:#0070ff;
      --accentB:#f80000;
    }

    html,body{
      margin:0;
      background:transparent;
      font-family:-apple-system,system-ui;
    }

    .overlay{
      position:fixed;
      bottom:28px;
      left:28px;
      width:420px;
      color:var(--text);
    }

    .banners{
      position:absolute;
      bottom:135px;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
    }

    .banner{
      display:none;
      padding:8px 22px;
      border-radius:8px;
      font-weight:700;
      background:rgba(0,0,0,.85);
      font-size:14px;
    }

    .banner.timeout{border:2px solid #FFC107;}
    .banner.match{border:2px solid #FF1744;}

    .card{
      background:var(--bg);
      border:1px solid var(--stroke);
      border-radius:14px;
      overflow:hidden;
      backdrop-filter:blur(12px);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 16px 40px 60px;
      align-items:center;
      gap:10px;
      padding:14px;
    }

    .row + .row{
      border-top:1px solid rgba(255,255,255,.08);
    }

    .row.a{box-shadow: inset 7px 0 0 var(--accentB);}
    .row.b{box-shadow: inset 7px 0 0 var(--accentA);}

    .nameWrap{
      display:grid;
      grid-template-columns:1fr 18px;
      align-items:center;
      gap:8px;
    }

    .name{
      font-weight:600;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
    }

    .service{
      font-size:12px;
      opacity:0;
      transition:.2s ease;
    }

    .service.on{
      opacity:1;
      transform:translateX(3px);
    }

    .timeoutIcon{
      font-size:11px;
      opacity:.2;
      justify-self:end;
    }

    .timeoutIcon.on{opacity:1;}

    .sets{
      font-size:20px;
      font-weight:800;
      text-align:center;
    }

    .score{
      font-size:30px;
      font-weight:900;
      text-align:right;
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="banners">
    <div class="banner timeout" id="timeoutBanner">TEMPS MORT</div>
    <div class="banner match" id="matchBanner">BALLE DE MATCH</div>
  </div>

  <div class="card">

    <div class="row a">
      <div class="nameWrap">
        <span class="name" id="nameA">JOUEUR A</span>
        <span class="timeoutIcon" id="toA">🕒</span>
      </div>

      <div class="service" id="serveA">▶</div>

      <div class="sets" id="setsA">0</div>

      <div class="score" id="scoreA">0</div>
    </div>

    <div class="row b">
      <div class="nameWrap">
        <span class="name" id="nameB">JOUEUR B</span>
        <span class="timeoutIcon" id="toB">🕒</span>
      </div>

      <div class="service" id="serveB">▶</div>

      <div class="sets" id="setsB">0</div>

      <div class="score" id="scoreB">0</div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

  const room =
          new URLSearchParams(location.search).get("room") || "table1"

  const socket = io()

  const el = id => document.getElementById(id)

  let bestOf = 5

  function matchPoint(st){

    const need = Math.ceil(bestOf/2)

    const a = st.points.A
    const b = st.points.B

    if(st.sets.A === need-1 && a>=10 && a-b>=1) return true
    if(st.sets.B === need-1 && b>=10 && b-a>=1) return true

    return false

  }

  socket.on("connect",()=>{
    socket.emit("join",room)
  })

  socket.on("state",(st)=>{

    bestOf = st.bestOf || 5

    el("nameA").textContent = st.players.A
    el("nameB").textContent = st.players.B

    el("scoreA").textContent = st.points.A
    el("scoreB").textContent = st.points.B

// SETS (chiffres)
    el("setsA").textContent = st.sets.A
    el("setsB").textContent = st.sets.B

// SERVICE
    el("serveA").classList.toggle("on", st.server==="A")
    el("serveB").classList.toggle("on", st.server==="B")

// TIMEOUT
    el("timeoutBanner").style.display =
            st.timeoutActive ? "block":"none"

// MATCH POINT
    el("matchBanner").style.display =
            matchPoint(st) ? "block":"none"

// TIMEOUT USED
    el("toA").classList.toggle("on",st.timeoutUsed.A)
    el("toB").classList.toggle("on",st.timeoutUsed.B)

  })

</script>

</body>
</html>
