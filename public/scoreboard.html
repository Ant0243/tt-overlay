<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TT SCOREBOARD</title>

    <style>

        html,body{
            margin:0;
            height:100%;
            background:#0b0f16;
            color:white;
            font-family:-apple-system,system-ui;
            overflow:hidden;
        }

        /* connexion */

        .status{
            position:fixed;
            top:16px;
            right:20px;
            font-size:14px;
            opacity:.8;
        }

        /* layout */

        .wrapper{
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        .players{
            width:92%;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:40px;
        }

        /* joueur */

        .player{
            background:rgba(255,255,255,.05);
            border-radius:22px;
            padding:35px;
            text-align:center;
        }

        .player.a{
            box-shadow: inset 10px 0 0 #0070ff;
        }

        .player.b{
            box-shadow: inset 10px 0 0 #f80000;
        }

        /* nom */

        .name{
            font-size:52px;
            font-weight:900;
            margin-bottom:10px;
        }

        /* service */

        .service{
            font-size:26px;
            font-weight:800;
            opacity:0;
            margin-bottom:10px;
        }

        .service.on{
            opacity:1;
        }

        /* score */

        .score{
            font-size:170px;
            font-weight:900;
            margin:10px 0 20px;
        }

        /* sets */

        .sets{
            display:flex;
            justify-content:center;
            gap:14px;
            margin-bottom:12px;
        }

        .set{
            width:26px;
            height:26px;
            border-radius:6px;
            background:#444;
        }

        .set.a{background:#0070ff;}
        .set.b{background:#f80000;}

        /* timeout icone */

        .timeoutUsed{
            font-size:20px;
            opacity:.3;
        }

        .timeoutUsed.on{
            opacity:1;
        }

        /* banners */

        .banner{
            position:fixed;
            top:40px;
            left:50%;
            transform:translateX(-50%);
            padding:12px 28px;
            border-radius:10px;
            font-weight:900;
            font-size:34px;
            display:none;
        }

        .timeoutBanner{border:2px solid #ffc107;}
        .matchBanner{border:2px solid #ff1744;}

    </style>
</head>

<body>

<div class="status" id="status">Connexion...</div>

<div class="banner timeoutBanner" id="timeoutBanner">TEMPS MORT</div>
<div class="banner matchBanner" id="matchBanner">BALLE DE MATCH</div>

<div class="wrapper">

    <div class="players">

        <div class="player a">

            <div class="name" id="nameA">JOUEUR A</div>

            <div class="service" id="serveA">▶ SERVICE</div>

            <div class="score" id="scoreA">0</div>

            <div class="sets" id="setsA"></div>

            <div class="timeoutUsed" id="toA">🕒</div>

        </div>

        <div class="player b">

            <div class="name" id="nameB">JOUEUR B</div>

            <div class="service" id="serveB">▶ SERVICE</div>

            <div class="score" id="scoreB">0</div>

            <div class="sets" id="setsB"></div>

            <div class="timeoutUsed" id="toB">🕒</div>

        </div>

    </div>

</div>

<script>

    const socket=new WebSocket(
        (location.protocol==="https:"?"wss://":"ws://")
        +location.host+"?token=moncode123"
    );

    const el=id=>document.getElementById(id);

    let bestOf=5;

    function teamName(st,team){

        if(team==="A"){
            return st.mode==="doubles" && st.A2
                ? st.A1+" / "+st.A2
                : st.A1;
        }else{
            return st.mode==="doubles" && st.B2
                ? st.B1+" / "+st.B2
                : st.B1;
        }

    }

    function renderSets(container,count,team){

        container.innerHTML="";

        const needed=Math.ceil(bestOf/2);

        for(let i=0;i<needed;i++){

            const d=document.createElement("div");
            d.className="set";

            if(i<count){
                d.classList.add(team==="A"?"a":"b");
            }

            container.appendChild(d);

        }

    }

    socket.onopen=()=>el("status").textContent="Connecté ✅";
    socket.onerror=()=>el("status").textContent="Erreur WebSocket ❌";
    socket.onclose=()=>el("status").textContent="Connexion perdue ⚠️";

    socket.onmessage=(event)=>{

        const st=JSON.parse(event.data);

        bestOf=st.bestOf||5;

        /* noms */

        el("nameA").textContent=teamName(st,"A");
        el("nameB").textContent=teamName(st,"B");

        /* scores */

        el("scoreA").textContent=st.pointsA;
        el("scoreB").textContent=st.pointsB;

        /* sets */

        renderSets(el("setsA"),st.setsA,"A");
        renderSets(el("setsB"),st.setsB,"B");

        /* service */

        if(!st.matchStarted){

            el("serveA").classList.remove("on");
            el("serveB").classList.remove("on");

        }else{

            el("serveA").classList.toggle("on",st.server==="A");
            el("serveB").classList.toggle("on",st.server==="B");

        }

        /* timeout utilisé */

        el("toA").classList.toggle("on",st.timeoutUsedA);
        el("toB").classList.toggle("on",st.timeoutUsedB);

        /* banners */

        el("timeoutBanner").style.display=
            st.timeoutActive?"block":"none";

        el("matchBanner").style.display=
            (st.matchPointFor==="A"||st.matchPointFor==="B")
                ?"block":"none";

    };

</script>

</body>
</html>
