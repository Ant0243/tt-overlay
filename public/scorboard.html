<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Scoreboard</title>

    <script src="/socket.io/socket.io.js"></script>

    <style>

        body{
            background:#111;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            width:90%;
            max-width:1000px;
            text-align:center;
        }

        .players{
            display:flex;
            justify-content:space-between;
            font-size:40px;
            margin-bottom:30px;
        }

        .score{
            display:flex;
            justify-content:space-between;
            font-size:150px;
            font-weight:bold;
        }

        .server{
            margin-top:30px;
            font-size:30px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="players">

        <div id="playerA">Joueur A</div>

        <div id="playerB">Joueur B</div>

    </div>

    <div class="score">

        <div id="scoreA">0</div>

        <div id="scoreB">0</div>

    </div>

    <div class="server">

        Service : <span id="server">A</span>

    </div>

</div>

<script>

    const room =
        new URLSearchParams(location.search).get("room") || "table1"

    const socket = io()

    socket.on("connect", () => {

        socket.emit("join", room)

    })

    socket.on("state",(st)=>{

        document.getElementById("playerA").innerText = st.players.A
        document.getElementById("playerB").innerText = st.players.B

        document.getElementById("scoreA").innerText = st.points.A
        document.getElementById("scoreB").innerText = st.points.B

        document.getElementById("server").innerText = st.serve

    })

</script>

</body>
</html>
