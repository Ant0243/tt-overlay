<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TT SCOREBOARD</title>

    <style>

        html,body{
            margin:0;
            height:100%;
            background:#0b0f16;
            color:white;
            font-family:-apple-system,system-ui;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        /* joueurs */

        .players{
            display:flex;
            width:90%;
            justify-content:space-between;
            margin-bottom:40px;
        }

        .player{
            flex:1;
            text-align:center;
        }

        .name{
            font-size:60px;
            font-weight:800;
            margin-bottom:20px;
        }

        .points{
            font-size:140px;
            font-weight:900;
        }

        /* sets */

        .sets{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:40px;
        }

        .set{
            width:30px;
            height:30px;
            border-radius:6px;
            background:#444;
        }

        .setA{ background:#0070ff; }
        .setB{ background:#f80000; }

        /* service */

        .service{
            margin-top:10px;
            font-size:30px;
            opacity:.3;
        }

        .service.on{
            opacity:1;
            transform:scale(1.2);
        }

        /* banners */

        .banner{
            position:fixed;
            top:40px;
            font-size:60px;
            font-weight:900;
            display:none;
        }

        .timeout{ color:#ffc107 }
        .match{ color:#ff1744 }

    </style>
</head>

<body>

<div class="banner timeout" id="timeoutBanner">TEMPS MORT</div>
<div class="banner match" id="matchBanner">BALLE DE MATCH</div>

<div class="players">

    <div class="player">

        <div class="name" id="nameA">JOUEUR A</div>

        <div class="service" id="serveA">SERVE</div>

        <div class="points" id="scoreA">0</div>

        <div class="sets" id="setsA"></div>

    </div>

    <div class="player">

        <div class="name" id="nameB">JOUEUR B</div>

        <div class="service" id="serveB">SERVE</div>

        <div class="points" id="scoreB">0</div>

        <div class="sets" id="setsB"></div>

    </div>

</div>

<script>

    const socket = new WebSocket(
        (location.protocol === "https:" ? "wss://" : "ws://")
        + location.host + "?token=moncode123"
    );

    const el = id => document.getElementById(id);

    let bestOf = 5;

    function teamName(st,team){

        if(team==="A"){
            return st.mode==="doubles" && st.A2
                ? st.A1+" / "+st.A2
                : st.A1;
        }else{
            return st.mode==="doubles" && st.B2
                ? st.B1+" / "+st.B2
                : st.B1;
        }

    }

    function renderSets(container,count,team){

        container.innerHTML="";

        const needed = Math.ceil(bestOf/2);

        for(let i=0;i<needed;i++){

            const d=document.createElement("div");

            d.className="set";

            if(i<count){
                d.classList.add(team==="A"?"setA":"setB");
            }

            container.appendChild(d);

        }

    }

    socket.onmessage = (event)=>{

        const st = JSON.parse(event.data);

        bestOf = st.bestOf || 5;

        el("nameA").textContent = teamName(st,"A");
        el("nameB").textContent = teamName(st,"B");

        el("scoreA").textContent = st.pointsA;
        el("scoreB").textContent = st.pointsB;

        renderSets(el("setsA"),st.setsA,"A");
        renderSets(el("setsB"),st.setsB,"B");

        /* service */

        if(!st.matchStarted || !st.server){

            el("serveA").classList.remove("on");
            el("serveB").classList.remove("on");

        }else{

            el("serveA").classList.toggle("on", st.server==="A");
            el("serveB").classList.toggle("on", st.server==="B");

        }

        /* banners */

        el("timeoutBanner").style.display =
            st.timeoutActive ? "block":"none";

        el("matchBanner").style.display =
            (st.matchPointFor==="A" || st.matchPointFor==="B")
                ? "block"
                : "none";

    };

</script>

</body>
</html>
