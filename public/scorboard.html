<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <title>Table Tennis Scoreboard</title>

    <script src="/socket.io/socket.io.js"></script>

    <style>

        body{
            background:#0f0f10;
            color:white;
            font-family:system-ui,-apple-system,Segoe UI,Roboto;
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:1200px;
            text-align:center;
        }

        .players{
            display:flex;
            justify-content:space-between;
            margin-bottom:40px;
            font-size:42px;
            font-weight:600;
        }

        .score{
            display:flex;
            justify-content:space-between;
            font-size:180px;
            font-weight:800;
            letter-spacing:2px;
        }

        .sets{
            display:flex;
            justify-content:space-between;
            margin-top:40px;
            font-size:28px;
        }

        .setBar{
            display:flex;
            gap:8px;
        }

        .set{
            width:18px;
            height:18px;
            border-radius:4px;
            background:#333;
        }

        .setA{
            background:#2F7DFF;
        }

        .setB{
            background:#FF3B6B;
        }

        .server{
            margin-top:40px;
            font-size:36px;
            opacity:0.85;
        }

        .serveDot{
            display:inline-block;
            width:12px;
            height:12px;
            border-radius:50%;
            background:white;
            margin-left:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="players">

        <div id="playerA">Joueur A</div>

        <div id="playerB">Joueur B</div>

    </div>

    <div class="score">

        <div id="scoreA">0</div>

        <div id="scoreB">0</div>

    </div>

    <div class="sets">

        <div class="setBar" id="setsA"></div>

        <div class="setBar" id="setsB"></div>

    </div>

    <div class="server">

        Service : <span id="server">A</span>
        <span class="serveDot"></span>

    </div>

</div>

<script>

    const socket = io()

    const el = id => document.getElementById(id)

    function renderSets(container,count,who){

        container.innerHTML=""

        for(let i=0;i<3;i++){

            const d=document.createElement("div")

            d.className="set"

            if(i<count){

                d.classList.add(who==="A"?"setA":"setB")

            }

            container.appendChild(d)

        }

    }

    socket.on("state",(st)=>{

        el("playerA").innerText=st.players.A
        el("playerB").innerText=st.players.B

        el("scoreA").innerText=st.points.A
        el("scoreB").innerText=st.points.B

        renderSets(el("setsA"),st.sets.A,"A")
        renderSets(el("setsB"),st.sets.B,"B")

        el("server").innerText=st.serve

    })

</script>

</body>

</html>
